name: iOS Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build CloseCut
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build
        run: |
          xcodebuild clean build \
            -project CloseCut.xcodeproj \
            -scheme CloseCut \
            -destination "generic/platform=iOS Simulator"
